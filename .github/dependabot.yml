version: 2

updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/Paris
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore"
      include: scope
    labels:
      - dependencies
      - security
    groups:
      next-stack:
        patterns:
          - next
          - eslint-config-next
      react-stack:
        patterns:
          - react
          - react-dom
          - "@types/react"
          - "@types/react-dom"
      prisma-stack:
        patterns:
          - prisma
          - "@prisma/client"
      tooling:
        patterns:
          - eslint
          - tailwindcss
          - "@tailwindcss/*"
          - typescript
          - "@types/node"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:20"
      timezone: Europe/Paris
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore"
      include: scope
    labels:
      - dependencies
      - security

  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:40"
      timezone: Europe/Paris
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore"
      include: scope
    labels:
      - dependencies
      - security
