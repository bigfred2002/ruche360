services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://rucher360:rucher360@db:5432/rucher360}
      NEXT_TELEMETRY_DISABLED: "1"
    ports:
      - "${APP_PORT:-3000}:3000"
    volumes:
      - .:/app
      - node_modules:/app/node_modules
      - pnpm_store:/pnpm/store
    depends_on:
      db:
        condition: service_healthy
    command: sh -lc "if [ -f package.json ]; then pnpm install && pnpm dev --hostname 0.0.0.0; else echo 'No Next.js app yet. Container is ready for future pnpm commands.' && tail -f /dev/null; fi"

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-rucher360}
      POSTGRES_USER: ${POSTGRES_USER:-rucher360}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-rucher360}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  node_modules:
  pnpm_store:
  postgres_data:
