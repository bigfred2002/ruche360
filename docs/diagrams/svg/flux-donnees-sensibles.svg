<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Flux de donnees sensibles Rucher360</title>
  <desc id="desc">Diagramme des donnees sensibles, frontieres organisationnelles, permissions, scans de secrets et modules desactives.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M0 0L10 5L0 10z" class="arrow-head"/></marker>
    <style>
      :root{--bg:#f8f5ed;--grid:#eadfc8;--text:#172033;--muted:#5f6b7a;--panel:#fff;--stroke:#d8c7a7;--amber:#d97706;--green:#15803d;--blue:#0369a1;--rose:#be123c;--violet:#7c3aed;--slate:#334155}
      @media (prefers-color-scheme: dark){:root{--bg:#111827;--grid:#243041;--text:#f8fafc;--muted:#cbd5e1;--panel:#1f2937;--stroke:#475569;--amber:#f59e0b;--green:#22c55e;--blue:#38bdf8;--rose:#fb7185;--violet:#a78bfa;--slate:#94a3b8}}
      .bg{fill:var(--bg)}.grid{stroke:var(--grid);stroke-width:1;opacity:.55}.title{fill:var(--text);font:800 34px ui-sans-serif,system-ui,sans-serif}.subtitle{fill:var(--muted);font:500 15px ui-sans-serif,system-ui,sans-serif}
      .box{fill:var(--panel);stroke:var(--stroke);stroke-width:2;rx:18}.sensitive{stroke:var(--rose)}.guard{stroke:var(--green)}.disabled{stroke:var(--amber);stroke-dasharray:7 7}
      .label{fill:var(--text);font:800 16px ui-sans-serif,system-ui,sans-serif}.small{fill:var(--muted);font:600 12px ui-sans-serif,system-ui,sans-serif}.line{fill:none;stroke:var(--slate);stroke-width:2.5;marker-end:url(#arrow)}.safe{fill:none;stroke:var(--green);stroke-width:2.5;marker-end:url(#arrow)}.block{fill:none;stroke:var(--rose);stroke-width:2.5;stroke-dasharray:8 8;marker-end:url(#arrow)}.arrow-head{fill:var(--slate)}
      .boundary{fill:none;stroke:var(--blue);stroke-width:3;stroke-dasharray:10 10;rx:28}.badge{fill:var(--rose);rx:10}.badge-text{fill:#fff;font:800 10px ui-sans-serif,system-ui,sans-serif}
    </style>
  </defs>
  <rect class="bg" width="1200" height="760"/>
  <g opacity=".5"><path class="grid" d="M0 80H1200M0 160H1200M0 240H1200M0 320H1200M0 400H1200M0 480H1200M0 560H1200M0 640H1200"/><path class="grid" d="M120 0V760M240 0V760M360 0V760M480 0V760M600 0V760M720 0V760M840 0V760M960 0V760M1080 0V760"/></g>
  <text class="title" x="60" y="64">Flux de donnees sensibles</text>
  <text class="subtitle" x="60" y="91">Frontieres, controles d'acces et modules futurs inactifs dans le depot public.</text>

  <rect class="boundary" x="360" y="130" width="720" height="490"/>
  <text class="small" x="388" y="158">Organisation: frontiere principale des donnees metier</text>

  <rect class="box guard" x="70" y="180" width="220" height="84"/><text class="label" x="98" y="214">Utilisateur</text><text class="small" x="98" y="239">Role + membership</text>
  <rect class="box guard" x="400" y="180" width="230" height="84"/><text class="label" x="428" y="214">Modules + permissions</text><text class="small" x="428" y="239">Visibilite et actions</text>

  <rect class="box sensitive" x="400" y="330" width="205" height="78"/><text class="label" x="428" y="362">Ruchers</text><text class="small" x="428" y="387">Localisation sensible</text><rect class="badge" x="520" y="342" width="58" height="20"/><text class="badge-text" x="531" y="356">SENSIBLE</text>
  <rect class="box" x="640" y="330" width="205" height="78"/><text class="label" x="668" y="362">Ruches &amp; colonies</text><text class="small" x="668" y="387">Donnees terrain</text>
  <rect class="box sensitive" x="880" y="330" width="170" height="78"/><text class="label" x="908" y="362">Contacts</text><text class="small" x="908" y="387">Donnees perso</text><rect class="badge" x="970" y="342" width="58" height="20"/><text class="badge-text" x="981" y="356">SENSIBLE</text>

  <rect class="box sensitive" x="400" y="455" width="205" height="78"/><text class="label" x="428" y="487">Documents</text><text class="small" x="428" y="512">Pieces jointes futures</text><rect class="badge" x="520" y="467" width="58" height="20"/><text class="badge-text" x="531" y="481">SENSIBLE</text>
  <rect class="box sensitive" x="640" y="455" width="205" height="78"/><text class="label" x="668" y="487">Sanitaire</text><text class="small" x="668" y="512">Observations et suivi</text><rect class="badge" x="760" y="467" width="58" height="20"/><text class="badge-text" x="771" y="481">SENSIBLE</text>
  <rect class="box sensitive" x="880" y="455" width="170" height="78"/><text class="label" x="908" y="487">Transhumance</text><text class="small" x="908" y="512">Historique ruches</text><rect class="badge" x="970" y="467" width="58" height="20"/><text class="badge-text" x="981" y="481">SENSIBLE</text>

  <rect class="box disabled" x="400" y="650" width="260" height="70"/><text class="label" x="428" y="680">IA / IoT / GPS futurs</text><text class="small" x="428" y="704">Prevus mais inactifs</text>
  <rect class="box guard" x="740" y="650" width="260" height="70"/><text class="label" x="768" y="680">Depot public</text><text class="small" x="768" y="704">pre-push + gitleaks</text>

  <path class="safe" d="M290 222H400"/>
  <path class="line" d="M515 264V330"/>
  <path class="line" d="M515 264C600 290 735 290 742 330"/>
  <path class="line" d="M515 264C690 285 960 290 965 330"/>
  <path class="line" d="M515 408V455"/>
  <path class="line" d="M742 408V455"/>
  <path class="line" d="M965 408V455"/>
  <path class="block" d="M755 533C755 610 530 610 530 650"/>
  <path class="safe" d="M880 533C880 610 870 610 870 650"/>

  <rect class="box" x="70" y="650" width="250" height="70"/><text class="label" x="98" y="680">Exports diagrammes</text><text class="small" x="98" y="704">Fictifs, relus avant commit</text>
</svg>
