<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Architecture technique Docker-first</title>
  <desc id="desc">Diagramme de l'architecture technique Rucher360 avec Docker Compose, CI GitHub, runner local manuel et controles de securite.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" class="arrow-head"/>
    </marker>
    <style>
      :root { --bg:#f8f5ed; --grid:#eadfc8; --text:#172033; --muted:#5f6b7a; --panel:#fff; --stroke:#d8c7a7; --amber:#d97706; --green:#15803d; --blue:#0369a1; --rose:#be123c; --violet:#7c3aed; --slate:#334155; }
      @media (prefers-color-scheme: dark) { :root { --bg:#111827; --grid:#243041; --text:#f8fafc; --muted:#cbd5e1; --panel:#1f2937; --stroke:#475569; --amber:#f59e0b; --green:#22c55e; --blue:#38bdf8; --rose:#fb7185; --violet:#a78bfa; --slate:#94a3b8; } }
      .bg{fill:var(--bg)} .grid{stroke:var(--grid);stroke-width:1;opacity:.55}
      .title{fill:var(--text);font:800 34px ui-sans-serif,system-ui,sans-serif}.subtitle{fill:var(--muted);font:500 15px ui-sans-serif,system-ui,sans-serif}
      .box{fill:var(--panel);stroke:var(--stroke);stroke-width:2;rx:18}.label{fill:var(--text);font:800 17px ui-sans-serif,system-ui,sans-serif}.small{fill:var(--muted);font:600 12px ui-sans-serif,system-ui,sans-serif}
      .line{fill:none;stroke:var(--slate);stroke-width:2.5;marker-end:url(#arrow)}.safe{fill:none;stroke:var(--green);stroke-width:2.5;marker-end:url(#arrow)}.danger{fill:none;stroke:var(--rose);stroke-width:2.5;stroke-dasharray:8 8}
      .arrow-head{fill:var(--slate)}.boundary{fill:none;stroke:var(--blue);stroke-width:3;stroke-dasharray:10 10;rx:28}.tag{fill:var(--panel);stroke:currentColor;stroke-width:2;rx:12}.tag-text{fill:currentColor;font:800 11px ui-sans-serif,system-ui,sans-serif}.green{color:var(--green)}.amber{color:var(--amber)}.rose{color:var(--rose)}
    </style>
  </defs>
  <rect class="bg" width="1200" height="760"/>
  <g opacity=".5"><path class="grid" d="M0 80H1200M0 160H1200M0 240H1200M0 320H1200M0 400H1200M0 480H1200M0 560H1200M0 640H1200"/><path class="grid" d="M120 0V760M240 0V760M360 0V760M480 0V760M600 0V760M720 0V760M840 0V760M960 0V760M1080 0V760"/></g>
  <text class="title" x="60" y="64">Architecture technique Docker-first</text>
  <text class="subtitle" x="60" y="91">Aucune installation Node, pnpm ou Prisma requise sur la machine hote.</text>

  <rect class="boundary" x="430" y="130" width="610" height="465"/>
  <text class="small" x="455" y="158">Environnement local Docker Compose</text>

  <rect class="box" x="70" y="150" width="240" height="86"/><text class="label" x="98" y="184">Developpeur</text><text class="small" x="98" y="209">Branche codex/*</text>
  <rect class="box" x="70" y="290" width="240" height="96"/><text class="label" x="98" y="324">Depot GitHub public</text><text class="small" x="98" y="349">PR, revue, squash merge</text>
  <rect class="box" x="70" y="450" width="240" height="96"/><text class="label" x="98" y="484">CI GitHub Actions</text><text class="small" x="98" y="509">security, compose, lint, build</text>

  <rect class="box" x="470" y="210" width="230" height="94"/><text class="label" x="498" y="244">Service app</text><text class="small" x="498" y="269">Next.js + TypeScript</text><text class="small" x="498" y="288">pnpm via Compose</text>
  <rect class="box" x="760" y="210" width="230" height="94"/><text class="label" x="788" y="244">Service db</text><text class="small" x="788" y="269">PostgreSQL local</text><text class="small" x="788" y="288">Volume postgres_data</text>
  <rect class="box" x="470" y="380" width="230" height="94"/><text class="label" x="498" y="414">Prisma</text><text class="small" x="498" y="439">Client genere dans Docker</text>
  <rect class="box" x="760" y="380" width="230" height="94"/><text class="label" x="788" y="414">Volumes Docker</text><text class="small" x="788" y="439">node_modules + pnpm_store</text>

  <rect class="box" x="430" y="625" width="280" height="78"/><text class="label" x="458" y="657">Runner local manuel</text><text class="small" x="458" y="681">Code relu uniquement</text>
  <rect class="box" x="760" y="625" width="280" height="78"/><text class="label" x="788" y="657">Scans confidentialite</text><text class="small" x="788" y="681">pre-push, security, gitleaks</text>

  <path class="line" d="M190 236V290"/>
  <path class="line" d="M310 338H470V257"/>
  <path class="line" d="M310 498H470"/>
  <path class="line" d="M700 257H760"/>
  <path class="line" d="M585 304V380"/>
  <path class="line" d="M700 427H760"/>
  <path class="safe" d="M190 546C190 650 315 665 430 665"/>
  <path class="safe" d="M710 665H760"/>
  <path class="danger" d="M560 625C520 575 500 545 500 500"/>

  <g class="green"><rect class="tag" x="70" y="610" width="265" height="36"/><text class="tag-text" x="88" y="633">Runner local: workflow_dispatch seulement</text></g>
  <g class="amber"><rect class="tag" x="70" y="660" width="265" height="36"/><text class="tag-text" x="88" y="683">Secrets hors Git, .env ignore</text></g>
  <g class="rose"><rect class="tag" x="760" y="520" width="280" height="36"/><text class="tag-text" x="778" y="543">Pas de PR publique non relue sur runner local</text></g>
</svg>
